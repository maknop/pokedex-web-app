name: Go

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.adoc'
      - '.github/**'

permissions:
  contents: read
  # Optional: allow read access to pull request.  Use with 'only-new-issues' option.
  # pull-requests: read
jobs:
  golangci:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Display build environment
        run: printenv

      - uses: actions/setup-go@v4
        name: Set up Go 1.x
        with:
          go-version: "1.19"
        env:
          GO111MODULE: off

      - uses: actions/checkout@v3
        name: Checkout pokedex-web-app

  golangci-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.56.0
          args: --timeout 3m --config .golangci.yaml
