services:
  web:
    build: .
    network_mode: host
    ports:
      - "8080:8080"
    environment:
    - POSTGRES_PASSWORD=postgres
    - POSTGRES_USER=postgres
    - POSTGRES_DB=pokemondb
    - POSTGRES_HOST=postgres
  postgres:
    image: "docker.io/library/postgres:16"
    ports:
      - 5432:5432
    # volumes:
    #   - ~/apps/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=pokemondb
    restart: always
