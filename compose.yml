services:
  db:
    image: "postgres:15"
    network_mode: bridge
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=pokemondb
    networks:
      - backend

  app:
    build: .
    depends_on:
    - db
    ports:
      - "8080:8080"
    environment:
    - POSTGRES_PASSWORD=postgres
    - POSTGRES_USER=postgres
    - POSTGRES_DB=pokemondb
    - POSTGRES_HOST=db
    networks:
    - backend

networks:
  backend:
    driver: bridge
