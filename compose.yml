services:
  web:
    build: .
    network_mode: host
    ports:
      - "8080:8080"
  postgres:
    image: "docker.io/library/postgres:16"
    ports:
      - 5432:5432
    volumes:
      - ~/apps/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD="${DATABASE_PASSWORD}"
      - POSTGRES_USER"${DATABASE_USER}
      - POSTGRES_DB="${DATABASE_NAME}"
